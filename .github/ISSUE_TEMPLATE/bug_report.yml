name: Bug report
description: Report a problem with MediaLocker
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!

        ⚠️ **Do not report security vulnerabilities here.** Follow our
        [Security Policy](../../SECURITY.md) instead.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of MediaLocker is affected?
      options:
        - api
        - app (dashboard)
        - mcp
        - worker
        - docs
        - packages
        - infra / docker-compose
        - not sure
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the behavior?
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version/commit, Node version, deployment (self-hosted vs. local), OS.
      placeholder: |
        - Commit/version:
        - Node:
        - Deployment:
        - OS:
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Relevant log output or screenshots. Redact any secrets.
      render: shell
    validations:
      required: false
